<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granny 1.6</title>

<link rel="icon" href="https://play-lh.googleusercontent.com/P8BbkQ6m0eCYYAx2tXTESBiIDQ2RESsSQp6oD8ZAP35rmEjmaXHMboYT6P807sAnfcuskKTdYbTyH5R0GCFk8Q">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap'); /* saira font */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: url("https://i.imgur.com/RitsNug.png"), default!important;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Saira, sans-serif;
    color: white;
    font-weight: bold;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#bg {
    position: fixed;
    inset: -5%;

    z-index: -2;

    background:
        url('https://preview.redd.it/yall-like-my-grandmother-art-v0-qebgd53qup7h1.jpeg?width=1920&format=pjpg&auto=webp&s=240f78a26530d7a15edd5897245973a9e50c224d')
        center center / cover no-repeat;

    transition: transform 0.15s ease-out;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
}

.play-btn {
    position: relative;
    z-index: 2;

    width: 90px;
    height: 90px;

    border: 2px solid #2ecc71;
    border-radius: 50%;

    background: #2f2f2f;
    color: #2ecc71;

    font-size: 34px;

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;

}

.play-btn i {
    transition: transform 0.3s ease;
}

.play-btn:hover i {
    animation: playArrow 0.6s ease-in-out infinite;
}

@keyframes playArrow {
    0% {
        transform: translateX(0);
    }

    50% {
        transform: translateX(8px);
    }

    100% {
        transform: translateX(0);
    }
}

/* @keyframes pulse {
    0% {
        box-shadow: 0 0 0 rgba(46,204,113,0);
    }

    50% {
        box-shadow: 0 0 30px rgba(46,204,113,.8);
    }

    100% {
        box-shadow: 0 0 0 rgba(46,204,113,0);
    }
} */

.play-btn:hover {
    transform: scale(1.08);
    background: #3b3b3b;
    box-shadow: 0 0 25px rgba(46, 204, 113, 0.65);
}

#embedContainer {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
}

#embedContainer object { /* im using object bc embed doesnt play sound */
    width: 100%;
    height: 100%;
    border: none;
}

#fog {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

#fog::before,
#fog::after {
    content: "";
    position: absolute;
    width: 250%;
    height: 250%;

    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 15%),
        radial-gradient(circle at 60% 50%, rgba(255,255,255,0.06), transparent 20%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 18%);

    filter: blur(60px);

    animation: drift 45s linear infinite;
}

#fog::after {
    animation-duration: 70s;
    animation-direction: reverse;
    opacity: 0.7;
}

@keyframes drift {
    from {
        transform: translate(-20%, -10%);
    }

    to {
        transform: translate(10%, 10%);
    }
}

.info {
    position: fixed;
    bottom: 20px;
    left: 20px;

    z-index: 2;

    padding: 15px 20px;
    min-width: 220px;

    background: rgba(20, 20, 20, 0.05);

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;

    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.info h3 {
    margin-bottom: 10px;
    color: #2ecc71;
    font-size: 1.1rem;
}

.info p {
    margin: 4px 0;
    font-size: 0.9rem;
    opacity: 0.9;
}

.info li {
    margin-left: 10px;
}

.granny-img {
    position: relative;
    z-index: 2;

    transition: all 0.4s ease;
}

.granny-img:hover {
    animation: rotate 3s ease-in-out infinite;
}

@keyframes rotate {
    0% {
        transform: rotate(-5deg);
    }

    25% {
        transform: rotate(5deg);
    }

    50% {
        transform: rotate(-5deg);
    }

    75% {
        transform: rotate(5deg);
    }

    100% {
        transform: rotate(-5deg);
    }
}

#bearTrap {
    position: fixed;

    bottom: 80px;
    left: 700px;

    width: 120px;

    z-index: 2;

    transition:
        transform 0.2s ease,
        filter 0.2s ease;

    cursor: url("https://i.imgur.com/RitsNug.png"), 16 16, default!important;

}

#bearTrap:hover {
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    cursor: url("https://i.imgur.com/RitsNug.png"), 16 16, default!important;
}

#bearTrap.closed {
    /* filler */
}

@keyframes trapSnap {
    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(0.9);
    }

    100% {
        transform: scale(1);
    }
}

#musicPrompt {
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);

    z-index: 99999;

    font-size: 1rem;
    letter-spacing: 2px;

    color: #fff;

    text-shadow:
        0 0 5px rgba(255,255,255,0.8),
        0 0 15px rgba(255,255,255,0.5);

    animation: sway 2s ease-in-out infinite;
}

@keyframes sway {
    0% {
        transform: translateX(-50%) rotate(-3deg);
    }

    50% {
        transform: translateX(-50%) rotate(3deg);
    }

    100% {
        transform: translateX(-50%) rotate(-3deg);
    }
}

#musicPrompt.hide {
    opacity: 0;
    transform: translateX(-50%) translateY(-20px);
    pointer-events: none;
    transition: all 0.4s ease;
}

#bg,
#bearTrap {
    transition: transform 0.3s cubic-bezier(.22,.61,.36,1); /* this so the beartrap and bg move together in the parallax effect */
}

</style>
</head>
<body>
<div id="bg"></div>

<audio id="menuMusic" loop> <!-- main menu music -->
    <source src="https://www.image2url.com/r2/default/audio/1782163629626-5d13d2b5-e679-4fd6-99c6-03118956ecd2.mp3" type="audio/mpeg">
</audio>

<audio id="beartrap" preload="auto"> <!-- beartrap sound -->
    <source src="https://www.image2url.com/r2/default/audio/1782163592949-7fc0cf5c-e9b1-4764-80e4-9bdcf467656a.wav" type="audio/mpeg">
</audio>

<div id="fog"></div>

<div id="musicPrompt">
    Click anywhere to activate music
</div>

<img class="granny-img" src="https://play-lh.googleusercontent.com/P8BbkQ6m0eCYYAx2tXTESBiIDQ2RESsSQp6oD8ZAP35rmEjmaXHMboYT6P807sAnfcuskKTdYbTyH5R0GCFk8Q" style="width: 88px; height: 88px;">
<br>
<h1>Play Granny 1.6</h1>
<br>
<button class="play-btn" id="launchBtn">
    <i class="fa-solid fa-play"></i>
</button>

<img id="bearTrap" src="https://i.imgur.com/EH1gYFk.png" alt="Bear Trap">

<div class="info">
    <h3>Version notes</h3>
        <ul>
            <li><p>Faster crouch movement</p></li>
            <li><p>You can hide under tables and <br> inside cabinets now</p></li>
            <li><p>You actually have 5 days now</p></li>
        </ul>
</div>

<div id="embedContainer">
    <object data="https://app-259805.games.s3.yandex.net/259805/fadb3yakgje68vxwmy7a1khmb3vj9vxc_brotli/index.html?sdk=%2Fsdk%2F_%2Fv2.97c96d6acac215f69e1d.js#origin=https%3A%2F%2Fyandex.com&app-id=259805&device-type=desktop"></object>
</div>

<script> 
// open game embed
document.getElementById("launchBtn").addEventListener("click", () => {
    document.getElementById("embedContainer").style.display = "block";
});

// beartrap
const trap = document.getElementById("bearTrap");
beartrap.volume = 1; 

trap.addEventListener("click", () => {
    if (trap.classList.contains("closed")) return;

    beartrap.currentTime = 0;
    beartrap.play();

    trap.src =
        "https://i.imgur.com/NLG0GdO.png";

    trap.style.width = "75px";
    trap.style.left = "723px";

    trap.classList.add("closed");
});

// main menu music
const menuMusic = document.getElementById("menuMusic");

document.addEventListener("click", () => {
    menuMusic.play();

    musicPrompt.classList.add("hide");

    setTimeout(() => {
        musicPrompt.remove();
    }, 400);
}, { once: true });

document.getElementById("launchBtn").addEventListener("click", () => {
    menuMusic.pause();
    menuMusic.currentTime = 0;

    document.getElementById("embedContainer").style.display = "block";
});

// background movement
const bg = document.getElementById("bg");
const trapmove = document.getElementById("bearTrap");

document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;

    bg.style.transform = `translate(${-x}px, ${-y}px)`;

    trapmove.style.transform = `translate(${-x}px, ${-y}px)`;
});

</script>

</body>
</html>
